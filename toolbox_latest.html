<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ツクエノウエの道具箱</title>
  <style>
    body{margin:0;font-family:"Segoe UI","Yu Gothic UI",sans-serif;background:#f3f7fc;color:#123;display:grid;place-items:center;min-height:100vh}
    .box{background:#fff;border:1px solid #d8e3f2;border-radius:12px;padding:20px;max-width:560px;box-shadow:0 10px 25px rgba(20,40,80,.08)}
    h1{margin:0 0 8px;font-size:20px}
    p{margin:0 0 8px;line-height:1.6}
    .err{color:#b42318;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="box">
    <h1>ツクエノウエの道具箱</h1>
    <p id="msg">起動準備中です…</p>
    <p id="err" class="err" hidden></p>
  </div>
  <script>
    const CHUNKS = [
      "./payload/toolbox_v1/chunk0.txt",
      "./payload/toolbox_v1/chunk1.txt",
      "./payload/toolbox_v1/chunk2.txt",
      "./payload/toolbox_v1/chunk3.txt",
      "./payload/toolbox_v1/chunk4.txt",
      "./payload/toolbox_v1/chunk5.txt",
      "./payload/toolbox_v1/chunk6.txt",
      "./payload/toolbox_v1/chunk7.txt"
    ];

    function b64ToBytes(b64){
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    async function gunzipToText(bytes){
      if("DecompressionStream" in window){
        const ds = new DecompressionStream("gzip");
        const stream = new Blob([bytes]).stream().pipeThrough(ds);
        return await new Response(stream).text();
      }
      await new Promise((resolve,reject)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js";
        s.onload=resolve; s.onerror=reject; document.head.appendChild(s);
      });
      return window.pako.ungzip(bytes, {to:"string"});
    }

    (async()=>{
      try{
        document.getElementById("msg").textContent = "アプリを読み込み中…";
        const parts = await Promise.all(CHUNKS.map(async (u)=>{
          const r = await fetch(u, {cache:"no-store"});
          if(!r.ok) throw new Error(`payload fetch failed: ${u} (${r.status})`);
          return (await r.text()).trim();
        }));

        const html = await gunzipToText(b64ToBytes(parts.join("")));
        document.open();
        document.write(html);
        document.close();
      }catch(e){
        document.getElementById("msg").textContent = "起動に失敗しました";
        const err = document.getElementById("err");
        err.hidden = false;
        err.textContent = String(e && e.message ? e.message : e);
      }
    })();
  </script>
</body>
</html>
